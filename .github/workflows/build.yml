name: Build plugin

on:
  push:
    branches: [main, master]
    tags: ['v*'] # tag pushes (e.g. v0.1.0) trigger the release path below
  pull_request:
  workflow_dispatch: # allows manual triggering from the Actions tab

# Needed by softprops/action-gh-release to publish the release. Scoped to this workflow only.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_path: build/SpectralFreeze_artefacts/Release/VST3
          - os: macos-latest
            name: macOS
            artifact_path: build/SpectralFreeze_artefacts/Release/VST3

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      # Bun is needed because CMake's configure step shells out to `bun install`
      # and `bun run build` to produce ui/dist before juce_add_binary_data globs
      # it. Pin to the same version as ui/package.json's packageManager field.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      # WebView2 SDK provides the static loader lib that NEEDS_WEBVIEW2 TRUE in
      # juce_add_plugin links against. JUCE's FindWebView2.cmake searches the
      # path given via JUCE_WEBVIEW2_PACKAGE_LOCATION for a *Microsoft.Web.WebView2*
      # directory. nuget.exe is preinstalled on windows-latest runners.
      - name: Install WebView2 SDK (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.3485.44 -OutputDirectory "$env:GITHUB_WORKSPACE\.nuget"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPECTRAL_FREEZE_UI_DEV=OFF -DJUCE_WEBVIEW2_PACKAGE_LOCATION="${{ github.workspace }}/.nuget"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload VST3 as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpectralFreeze-${{ matrix.name }}-VST3
          path: ${{ matrix.artifact_path }}

      # --- Release path: only runs for tag pushes ---------------------------------------
      # Zips the VST3 bundle into a single file per platform so the friend downloads one
      # archive, not a sprawl of folders. Each platform's job attaches its own zip to the
      # same release (identified by the pushed tag).

      - name: Package VST3 (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ matrix.artifact_path }}/Spectral Freeze.vst3" `
            -DestinationPath "SpectralFreeze-Windows-${{ github.ref_name }}.zip"

      - name: Package VST3 (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'macos-latest'
        run: |
          cd "${{ matrix.artifact_path }}"
          zip -r "$GITHUB_WORKSPACE/SpectralFreeze-macOS-${{ github.ref_name }}.zip" \
                 "Spectral Freeze.vst3"

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SpectralFreeze-*-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
